<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum — Habit Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --surface3: #22222c;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --gold: #d4a853;
      --gold-dim: rgba(212,168,83,0.15);
      --gold-glow: rgba(212,168,83,0.3);
      --text: #e8e6e1;
      --text2: #9c9a96;
      --text3: #5c5a57;
      --green: #4ade80;
      --green-dim: rgba(74,222,128,0.12);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.12);
      --blue: #60a5fa;
      --blue-dim: rgba(96,165,250,0.12);
      --purple: #a78bfa;
      --purple-dim: rgba(167,139,250,0.12);
      --orange: #fb923c;
      --orange-dim: rgba(251,146,60,0.12);
      --radius: 12px;
      --radius-lg: 18px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    .light {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #f0efe9;
      --surface3: #e8e7e0;
      --border: rgba(0,0,0,0.07);
      --border2: rgba(0,0,0,0.12);
      --text: #1a1916;
      --text2: #5c5a54;
      --text3: #9c9a96;
      --gold-dim: rgba(180,130,40,0.1);
      --green-dim: rgba(20,150,60,0.1);
      --red-dim: rgba(200,40,40,0.1);
      --blue-dim: rgba(30,100,200,0.1);
      --shadow: 0 4px 24px rgba(0,0,0,0.1);
    }

    html, body, #root { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      transition: background var(--transition), color var(--transition);
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

    /* LAYOUT */
    .app-layout { display: flex; height: 100vh; overflow: hidden; }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      transition: width var(--transition), transform var(--transition);
      z-index: 100;
    }

    .sidebar-logo {
      padding: 0 20px 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: -0.5px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .nav-section { padding: 0 12px; flex: 1; }

    .nav-label {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0 8px;
      margin: 16px 0 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text2);
      transition: all var(--transition);
      margin-bottom: 2px;
      user-select: none;
    }

    .nav-item:hover { background: var(--surface2); color: var(--text); }

    .nav-item.active {
      background: var(--gold-dim);
      color: var(--gold);
      border: 1px solid rgba(212,168,83,0.2);
    }

    .nav-icon { width: 18px; height: 18px; flex-shrink: 0; }

    .nav-badge {
      margin-left: auto;
      background: var(--gold);
      color: #000;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 20px;
      min-width: 18px;
      text-align: center;
    }

    .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border); }

    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text2);
      transition: all var(--transition);
    }

    .theme-toggle:hover { background: var(--surface2); color: var(--text); }

    /* MAIN */
    .main { flex: 1; overflow-y: auto; background: var(--bg); }

    .page-header {
      padding: 32px 36px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .page-subtitle { font-size: 13px; color: var(--text2); margin-top: 3px; }

    .page-content { padding: 28px 36px; }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
    }

    .btn-primary {
      background: var(--gold);
      color: #0a0a0f;
    }

    .btn-primary:hover { background: #e4b963; transform: translateY(-1px); box-shadow: 0 4px 16px var(--gold-glow); }

    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border2);
    }

    .btn-ghost:hover { background: var(--surface2); color: var(--text); }

    .btn-danger {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid rgba(248,113,113,0.2);
    }

    .btn-danger:hover { background: rgba(248,113,113,0.2); }

    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      transition: border-color var(--transition);
    }

    .card:hover { border-color: var(--border2); }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    /* STAT CARDS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px;
      position: relative;
      overflow: hidden;
      transition: all var(--transition);
    }

    .stat-card::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 80px; height: 80px;
      border-radius: 50%;
      transform: translate(30px, -30px);
      opacity: 0.08;
    }

    .stat-card.gold::after { background: var(--gold); }
    .stat-card.green::after { background: var(--green); }
    .stat-card.blue::after { background: var(--blue); }
    .stat-card.purple::after { background: var(--purple); }

    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

    .stat-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-bottom: 14px;
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
    }

    .stat-label { font-size: 12px; color: var(--text2); margin-top: 6px; font-weight: 500; }

    .stat-delta { font-size: 11px; margin-top: 8px; }

    /* HABIT ITEM */
    .habits-list { display: flex; flex-direction: column; gap: 12px; }

    .habit-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all var(--transition);
      cursor: pointer;
    }

    .habit-item:hover { border-color: var(--border2); transform: translateX(3px); }

    .habit-item.completed { opacity: 0.65; }

    .habit-checkbox {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 2px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: all var(--transition);
    }

    .habit-checkbox.checked {
      background: var(--green);
      border-color: var(--green);
      color: #000;
    }

    .habit-checkbox:hover { border-color: var(--gold); }

    .habit-info { flex: 1; min-width: 0; }

    .habit-name {
      font-weight: 600;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .habit-item.completed .habit-name { text-decoration: line-through; color: var(--text3); }

    .habit-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 5px;
    }

    .habit-category {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    .habit-streak {
      font-size: 12px;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .priority-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .priority-high { background: var(--red); }
    .priority-medium { background: var(--gold); }
    .priority-low { background: var(--green); }

    .habit-actions { display: flex; gap: 6px; align-items: center; }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 32px;
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    @keyframes slideUp { from { opacity: 0; transform: translateY(30px) scale(0.97); } to { opacity: 1; transform: none; } }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    /* FORMS */
    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      transition: border-color var(--transition);
      outline: none;
    }

    .form-input:focus { border-color: var(--gold); }

    .form-input::placeholder { color: var(--text3); }

    select.form-input { cursor: pointer; }

    textarea.form-input { resize: vertical; min-height: 80px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    /* PROGRESS BAR */
    .progress-bar {
      background: var(--surface3);
      border-radius: 20px;
      height: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 20px;
      background: linear-gradient(90deg, var(--gold), var(--orange));
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    .progress-fill.green { background: linear-gradient(90deg, #4ade80, #22d3ee); }
    .progress-fill.blue { background: linear-gradient(90deg, #60a5fa, #a78bfa); }

    /* ANALYTICS */
    .analytics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    .chart-card.full { grid-column: 1 / -1; }

    .chart-title {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* HEATMAP */
    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(53, 1fr);
      gap: 3px;
    }

    .heatmap-cell {
      aspect-ratio: 1;
      border-radius: 2px;
      background: var(--surface3);
      transition: all var(--transition);
      cursor: pointer;
    }

    .heatmap-cell:hover { transform: scale(1.4); z-index: 1; }

    .heatmap-cell.l1 { background: rgba(212,168,83,0.25); }
    .heatmap-cell.l2 { background: rgba(212,168,83,0.5); }
    .heatmap-cell.l3 { background: rgba(212,168,83,0.75); }
    .heatmap-cell.l4 { background: var(--gold); }

    /* CHALLENGE */
    .challenge-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-bottom: 20px;
    }

    .challenge-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }

    .challenge-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
    }

    .challenge-day {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      background: var(--gold-dim);
      color: var(--gold);
      border: 1px solid rgba(212,168,83,0.3);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .day-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin: 16px 0;
    }

    .day-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--surface3);
      position: relative;
      cursor: pointer;
      transition: all var(--transition);
    }

    .day-dot.done { background: var(--green); }
    .day-dot.missed { background: var(--red-dim); border: 1px solid var(--red); }
    .day-dot.today { background: var(--gold); animation: pulse 2s infinite; }
    .day-dot:hover { transform: scale(1.3); }

    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 var(--gold-glow); } 50% { box-shadow: 0 0 0 6px transparent; } }

    /* MOTIVATIONAL BANNER */
    .motivation-banner {
      background: linear-gradient(135deg, rgba(212,168,83,0.12), rgba(251,146,60,0.06));
      border: 1px solid rgba(212,168,83,0.2);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .motivation-icon { font-size: 28px; }

    .motivation-text { font-size: 15px; font-weight: 500; line-height: 1.5; }

    .motivation-text strong { color: var(--gold); }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      transition: all var(--transition);
      font-family: 'DM Sans', sans-serif;
    }

    .filter-chip:hover { border-color: var(--gold); color: var(--gold); }
    .filter-chip.active { background: var(--gold-dim); border-color: rgba(212,168,83,0.3); color: var(--gold); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }

    .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

    .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 8px; color: var(--text); }

    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* MOBILE */
    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text);
      padding: 4px;
    }

    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .analytics-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 700px) {
      .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
        box-shadow: var(--shadow);
      }
      .sidebar.open { transform: translateX(0); }
      .mobile-menu-btn { display: flex; }
      .page-header { padding: 20px; }
      .page-content { padding: 16px; }
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .stat-value { font-size: 26px; }
      .heatmap-grid { grid-template-columns: repeat(26, 1fr); }
      .form-row { grid-template-columns: 1fr; }
      .modal { padding: 20px; }
    }

    @media (max-width: 400px) {
      .stats-grid { grid-template-columns: 1fr; }
    }

    /* NOTIFICATION TOAST */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      box-shadow: var(--shadow);
      animation: slideInRight 0.3s cubic-bezier(0.34,1.56,0.64,1);
      max-width: 320px;
    }

    @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: none; } }

    .toast.success { border-left: 3px solid var(--green); }
    .toast.warning { border-left: 3px solid var(--gold); }
    .toast.error { border-left: 3px solid var(--red); }

    /* SECTION HEADER */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
    }

    /* STREAK BADGE */
    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* CATEGORY COLORS */
    .cat-health { background: var(--green-dim); color: var(--green); }
    .cat-study { background: var(--blue-dim); color: var(--blue); }
    .cat-coding { background: var(--purple-dim); color: var(--purple); }
    .cat-fitness { background: var(--orange-dim); color: var(--orange); }
    .cat-mindfulness { background: rgba(167,139,250,0.15); color: #c4b5fd; }
    .cat-nutrition { background: rgba(74,222,128,0.15); color: #86efac; }
    .cat-other { background: var(--surface3); color: var(--text2); }

    /* DIVIDER */
    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    /* TWO COL */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    @media (max-width: 700px) {
      .two-col { grid-template-columns: 1fr; }
    }

    /* Animated bg for dashboard */
    .dash-bg {
      background: radial-gradient(ellipse at 80% 0%, rgba(212,168,83,0.04) 0%, transparent 50%);
      min-height: 100%;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

/* ===================== CONTEXT ===================== */
const AppContext = createContext();

const CATEGORIES = ['Health', 'Study', 'Coding', 'Fitness', 'Mindfulness', 'Nutrition', 'Other'];
const PRIORITIES = ['Low', 'Medium', 'High'];

const MOTIVATIONAL_MESSAGES = [
  { threshold: 0, icon: '🌱', msg: 'Every journey begins with a single step. <strong>Start today.</strong>' },
  { threshold: 0.2, icon: '🔥', msg: 'You\'re building momentum. <strong>Keep going!</strong>' },
  { threshold: 0.5, icon: '⚡', msg: 'Halfway there! <strong>Your consistency is paying off.</strong>' },
  { threshold: 0.7, icon: '🏆', msg: 'You\'re crushing it! <strong>Champions are made in moments like this.</strong>' },
  { threshold: 0.9, icon: '🌟', msg: 'Legendary! <strong>You\'re in the top tier of achievers.</strong>' },
];

function getMotivation(rate) {
  const msg = [...MOTIVATIONAL_MESSAGES].reverse().find(m => rate >= m.threshold);
  return msg || MOTIVATIONAL_MESSAGES[0];
}

function todayStr() { return new Date().toISOString().split('T')[0]; }
function dateLabel(d) { return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }

function genId() { return Math.random().toString(36).slice(2, 9); }

/* ===================== STORAGE ===================== */
function loadState() {
  try {
    const raw = localStorage.getItem('momentum_state');
    if (!raw) return null;
    const s = JSON.parse(raw);
    // midnight reset check
    const last = s.lastResetDate;
    const today = todayStr();
    if (last && last !== today) {
      // don't reset completions; historical is kept, new day starts fresh
      s.lastResetDate = today;
    }
    return s;
  } catch { return null; }
}

function saveState(state) {
  try { localStorage.setItem('momentum_state', JSON.stringify(state)); } catch {}
}

/* ===================== APP PROVIDER ===================== */
function AppProvider({ children }) {
  const init = loadState() || {
    habits: [],
    challenges: [],
    history: {}, // { 'YYYY-MM-DD': { habitId: true/false } }
    theme: 'dark',
    lastResetDate: todayStr(),
  };

  const [state, setState] = useState(init);
  const [toasts, setToasts] = useState([]);

  // persist
  useEffect(() => { saveState(state); }, [state]);

  // midnight reset
  useEffect(() => {
    const check = () => {
      const today = todayStr();
      if (state.lastResetDate !== today) {
        setState(s => ({ ...s, lastResetDate: today }));
        addToast('New day unlocked! Mark your habits ✨', 'warning');
      }
    };
    const interval = setInterval(check, 60000);
    return () => clearInterval(interval);
  }, [state.lastResetDate]);

  const addToast = useCallback((message, type = 'success') => {
    const id = genId();
    setToasts(t => [...t, { id, message, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);

  const addHabit = useCallback((habit) => {
    setState(s => ({ ...s, habits: [...s.habits, { ...habit, id: genId(), createdAt: todayStr() }] }));
    addToast('Habit created! 🎯');
  }, [addToast]);

  const editHabit = useCallback((id, updates) => {
    setState(s => ({ ...s, habits: s.habits.map(h => h.id === id ? { ...h, ...updates } : h) }));
    addToast('Habit updated ✏️');
  }, [addToast]);

  const deleteHabit = useCallback((id) => {
    setState(s => ({ ...s, habits: s.habits.filter(h => h.id !== id) }));
    addToast('Habit removed', 'error');
  }, [addToast]);

  const toggleHabit = useCallback((id) => {
    const today = todayStr();
    setState(s => {
      const dayHistory = s.history[today] || {};
      const newVal = !dayHistory[id];
      return {
        ...s,
        history: { ...s.history, [today]: { ...dayHistory, [id]: newVal } }
      };
    });
  }, []);

  const isCompletedToday = useCallback((id) => {
    return !!(state.history[todayStr()]?.[id]);
  }, [state.history]);

  const getStreak = useCallback((id) => {
    let streak = 0;
    const d = new Date();
    while (true) {
      const key = d.toISOString().split('T')[0];
      if (state.history[key]?.[id]) { streak++; d.setDate(d.getDate() - 1); }
      else break;
    }
    return streak;
  }, [state.history]);

  const getLongestStreak = useCallback((id) => {
    let longest = 0, current = 0;
    const dates = Object.keys(state.history).sort();
    for (const date of dates) {
      if (state.history[date]?.[id]) { current++; longest = Math.max(longest, current); }
      else current = 0;
    }
    return longest;
  }, [state.history]);

  const getCompletionRate = useCallback((id, days = 30) => {
    let done = 0;
    const d = new Date();
    for (let i = 0; i < days; i++) {
      const key = d.toISOString().split('T')[0];
      if (state.history[key]?.[id]) done++;
      d.setDate(d.getDate() - 1);
    }
    return done / days;
  }, [state.history]);

  const addChallenge = useCallback((challenge) => {
    setState(s => ({ ...s, challenges: [...s.challenges, { ...challenge, id: genId(), createdAt: todayStr() }] }));
    addToast('90-Day Challenge started! 💪');
  }, [addToast]);

  const deleteChallenge = useCallback((id) => {
    setState(s => ({ ...s, challenges: s.challenges.filter(c => c.id !== id) }));
    addToast('Challenge removed', 'error');
  }, [addToast]);

  const toggleTheme = useCallback(() => {
    setState(s => ({ ...s, theme: s.theme === 'dark' ? 'light' : 'dark' }));
  }, []);

  const exportData = useCallback(() => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `momentum-export-${todayStr()}.json`;
    a.click();
    addToast('Data exported successfully 📦');
  }, [state, addToast]);

  return (
    <AppContext.Provider value={{
      state, addHabit, editHabit, deleteHabit, toggleHabit,
      isCompletedToday, getStreak, getLongestStreak, getCompletionRate,
      addChallenge, deleteChallenge, toggleTheme, exportData, addToast
    }}>
      <div className={state.theme === 'light' ? 'light' : ''}>
        {children}
        <ToastContainer toasts={toasts} />
      </div>
    </AppContext.Provider>
  );
}

/* ===================== TOAST ===================== */
function ToastContainer({ toasts }) {
  if (!toasts.length) return null;
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>
          <span>{t.type === 'success' ? '✅' : t.type === 'error' ? '❌' : '⚠️'}</span>
          <span>{t.message}</span>
        </div>
      ))}
    </div>
  );
}

          <div className={`priority-dot priority-${habit.priority.toLowerCase()}`} />
          <span style={{ fontSize: 11, color: 'var(--text3)' }}>{habit.priority}</span>
          {streak > 0 && (
            <span className="habit-streak">🔥 {streak}d streak</span>
          )}
        </div>
      </div>
      {showActions && (
        <div className="habit-actions" onClick={e => e.stopPropagation()}>
          <button className="btn btn-ghost btn-sm" onClick={() => onEdit(habit)}>{Icons.edit}</button>
          <button className="btn btn-danger btn-sm" onClick={() => onDelete(habit.id)}>{Icons.trash}</button>
        </div>
      )}
    </div>
  );
}

/* ===================== HABITS PAGE ===================== */
function HabitsPage() {
  const { state, addHabit, editHabit, deleteHabit } = useContext(AppContext);
  const [showForm, setShowForm] = useState(false);
  const [editTarget, setEditTarget] = useState(null);
  const [filter, setFilter] = useState('All');
  const [search, setSearch] = useState('');

  const filtered = state.habits.filter(h => {
    const matchCat = filter === 'All' || h.category === filter;
    const matchSearch = h.title.toLowerCase().includes(search.toLowerCase());
    return matchCat && matchSearch;
  });

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">My Habits</div>
          <div className="page-subtitle">{state.habits.length} habits tracked</div>
        </div>
        <button className="btn btn-primary" onClick={() => setShowForm(true)}>
          {Icons.plus} New Habit
        </button>
      </div>
      <div className="page-content">
        <div style={{ marginBottom: 16 }}>
          <input
            className="form-input"
            placeholder="🔍  Search habits..."
            value={search}
            onChange={e => setSearch(e.target.value)}
            style={{ maxWidth: 300 }}
          />
        </div>
        <div className="filter-bar">
          {['All', ...CATEGORIES].map(cat => (
            <button key={cat} className={`filter-chip ${filter === cat ? 'active' : ''}`} onClick={() => setFilter(cat)}>
              {cat}
            </button>
          ))}
        </div>

        {filtered.length === 0 ? (
          <div className="empty-state">
            <div className="empty-state-icon">📝</div>
            <h3>No habits found</h3>
            <p>{state.habits.length === 0 ? 'Create your first habit to get started!' : 'Try a different filter or search term.'}</p>
          </div>
        ) : (
          <div className="habits-list">
            {filtered.map(h => (
              <HabitRow
                key={h.id}
                habit={h}
                onEdit={h => setEditTarget(h)}
                onDelete={id => deleteHabit(id)}
              />
            ))}
          </div>
        )}
      </div>

      {showForm && (
        <HabitForm onSubmit={addHabit} onClose={() => setShowForm(false)} />
      )}
      {editTarget && (
        <HabitForm
          initial={editTarget}
          onSubmit={u => editHabit(editTarget.id, u)}
          onClose={() => setEditTarget(null)}
        />
      )}
    </div>
  );
}

/* ===================== CHART COMPONENTS ===================== */
function LineChartComp({ data, label }) {
  const ref = useRef();
  const chartRef = useRef();

  useEffect(() => {
    if (chartRef.current) { chartRef.current.destroy(); }
    const ctx = ref.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'line',
      data: {
        labels: data.map(d => d.label),
        datasets: [{
          label,
          data: data.map(d => d.value),
          borderColor: '#d4a853',
          backgroundColor: 'rgba(212,168,83,0.08)',
          borderWidth: 2,
          pointBackgroundColor: '#d4a853',
          pointRadius: 4,
          fill: true,
          tension: 0.4,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#5c5a57', font: { family: 'DM Sans', size: 11 } } },
          y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#5c5a57', font: { family: 'DM Sans', size: 11 } }, min: 0, max: 100 }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [data]);

  return <canvas ref={ref} style={{ height: 200 }} />;
}

function BarChartComp({ data }) {
  const ref = useRef();
  const chartRef = useRef();

  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    const ctx = ref.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: data.map(d => d.label),
        datasets: [{
          label: 'Completion %',
          data: data.map(d => d.value),
          backgroundColor: data.map((_, i) => `hsla(${30 + i * 15}, 80%, 60%, 0.7)`),
          borderRadius: 6,
          borderSkipped: false,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#5c5a57', font: { family: 'DM Sans', size: 11 } } },
          y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#5c5a57', font: { family: 'DM Sans', size: 11 } }, min: 0, max: 100 }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [data]);

  return <canvas ref={ref} style={{ height: 200 }} />;
}

function PieChartComp({ data }) {
  const ref = useRef();
  const chartRef = useRef();

  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    if (!data.length) return;
    const ctx = ref.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: data.map(d => d.label),
        datasets: [{
          data: data.map(d => d.value),
          backgroundColor: ['#d4a853','#4ade80','#60a5fa','#a78bfa','#fb923c','#f87171','#6b7280'],
          borderWidth: 0,
          hoverOffset: 6,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: { color: '#9c9a96', font: { family: 'DM Sans', size: 11 }, padding: 12, boxWidth: 10 }
          }
        },
        cutout: '65%',
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [data]);

  return <canvas ref={ref} style={{ height: 220 }} />;
}

/* ===================== ANALYTICS PAGE ===================== */
function AnalyticsPage() {
  const { state, getCompletionRate } = useContext(AppContext);

  // Daily completion for last 14 days
  const dailyData = Array.from({ length: 14 }, (_, i) => {
    const d = new Date();
    d.setDate(d.getDate() - (13 - i));
    const key = d.toISOString().split('T')[0];
    const dayHabits = state.habits.length;
    const done = dayHabits ? Object.values(state.history[key] || {}).filter(Boolean).length : 0;
    return { label: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }), value: dayHabits ? Math.round((done / dayHabits) * 100) : 0 };
  });

  // Weekly perf
  const weeklyData = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'].map((label, i) => {
    const d = new Date();
    const day = d.getDay();
    const diff = i - (day === 0 ? 6 : day - 1);
    d.setDate(d.getDate() + diff);
    const key = d.toISOString().split('T')[0];
    const dayHabits = state.habits.length;
    const done = dayHabits ? Object.values(state.history[key] || {}).filter(Boolean).length : 0;
    return { label, value: dayHabits ? Math.round((done / dayHabits) * 100) : 0 };
  });

  // Category distribution
  const catCounts = {};
  state.habits.forEach(h => { catCounts[h.category] = (catCounts[h.category] || 0) + 1; });
  const pieData = Object.entries(catCounts).map(([label, value]) => ({ label, value }));

  // Per-habit 30d rate
  const habitRates = state.habits.map(h => ({
    label: h.title.length > 20 ? h.title.slice(0, 20) + '…' : h.title,
    value: Math.round(getCompletionRate(h.id, 30) * 100)
  }));

  // Heatmap: last 364 days
  const heatmapCells = Array.from({ length: 364 }, (_, i) => {
    const d = new Date();
    d.setDate(d.getDate() - (363 - i));
    const key = d.toISOString().split('T')[0];
    const dayHabits = state.habits.length;
    const done = dayHabits ? Object.values(state.history[key] || {}).filter(Boolean).length : 0;
    const rate = dayHabits ? done / dayHabits : 0;
    let level = 'l0';
    if (rate > 0.75) level = 'l4';
    else if (rate > 0.5) level = 'l3';
    else if (rate > 0.25) level = 'l2';
    else if (rate > 0) level = 'l1';
    return { key, level, date: d.toLocaleDateString() };
  });

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Analytics</div>
          <div className="page-subtitle">Visualizing your consistency journey</div>
        </div>
      </div>
      <div className="page-content">
        {state.habits.length === 0 ? (
          <div className="empty-state">
            <div className="empty-state-icon">📊</div>
            <h3>No data yet</h3>
            <p>Add habits and track them daily to see your analytics.</p>
          </div>
        ) : (
          <>
            <div className="chart-card" style={{ marginBottom: 20 }}>
              <div className="chart-title">
                Activity Heatmap — Last 12 Months
                <div style={{ display: 'flex', gap: 4, alignItems: 'center', fontSize: 11, color: 'var(--text3)' }}>
                  <span>Less</span>
                  {['l0','l1','l2','l3','l4'].map(l => (
                    <div key={l} className={`heatmap-cell ${l}`} style={{ width: 12, height: 12, flexShrink: 0 }} />
                  ))}
                  <span>More</span>
                </div>
              </div>
              <div className="heatmap-grid">
                {heatmapCells.map((c, i) => (
                  <div key={i} className={`heatmap-cell ${c.level}`} title={c.date} />
                ))}
              </div>
            </div>

            <div className="analytics-grid">
              <div className="chart-card">
                <div className="chart-title">Daily Completion Rate (14 days)</div>
                <LineChartComp data={dailyData} label="Completion %" />
              </div>
              <div className="chart-card">
                <div className="chart-title">This Week</div>
                <BarChartComp data={weeklyData} />
              </div>
            </div>

            <div className="analytics-grid">
              <div className="chart-card">
                <div className="chart-title">Habit Categories</div>
                <PieChartComp data={pieData} />
              </div>
              <div className="chart-card">
                <div className="chart-title">30-Day Rate by Habit</div>
                {habitRates.length > 0 ? <BarChartComp data={habitRates} /> : <div style={{ color: 'var(--text3)', textAlign: 'center', paddingTop: 60 }}>No data yet</div>}
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ===================== CHALLENGE PAGE ===================== */
function ChallengePage() {
  const { state, addChallenge, deleteChallenge, toggleHabit, isCompletedToday } = useContext(AppContext);
  const [showForm, setShowForm] = useState(false);

  function getChallengeDay(c) {
    const start = new Date(c.startDate);
    const now = new Date(todayStr());
    return Math.min(90, Math.floor((now - start) / 86400000) + 1);
  }

  function getChallengeCompletions(c) {
    let done = 0;
    for (let i = 0; i < 90; i++) {
      const d = new Date(c.startDate);
      d.setDate(d.getDate() + i);
      const key = d.toISOString().split('T')[0];
      if (state.history[key]?.[c.id]) done++;
    }
    return done;
  }

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">90-Day Challenge</div>
          <div className="page-subtitle">Transform your life in 90 days of consistent action</div>
        </div>
        <button className="btn btn-primary" onClick={() => setShowForm(true)}>
          {Icons.plus} New Challenge
        </button>
      </div>
      <div className="page-content">
        {state.challenges.length === 0 && (
          <div className="empty-state">
            <div className="empty-state-icon">🏆</div>
            <h3>No Active Challenges</h3>
            <p>Launch a 90-day challenge to build life-changing habits over 3 months of focused effort.</p>
            <div style={{ marginTop: 20 }}>
              <button className="btn btn-primary" onClick={() => setShowForm(true)}>
                🚀 Start Your Challenge
              </button>
            </div>
          </div>
        )}

        {state.challenges.map(c => {
          const currentDay = getChallengeDay(c);
          const completions = getChallengeCompletions(c);
          const successRate = Math.round((completions / Math.max(1, currentDay)) * 100);
          const progress = (currentDay / 90) * 100;

          return (
            <div key={c.id} className="challenge-card">
              <div className="challenge-header">
                <div>
                  <div className="challenge-title">{c.title}</div>
                  {c.description && <div style={{ fontSize: 13, color: 'var(--text2)', marginTop: 6 }}>{c.description}</div>}
                  <div style={{ marginTop: 10, display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                    <span className={`habit-category cat-${c.category.toLowerCase()}`}>{c.category}</span>
                    <span style={{ fontSize: 12, color: 'var(--text2)' }}>Started {dateLabel(c.startDate)}</span>
                  </div>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 8 }}>
                  <span className="challenge-day">Day {currentDay} / 90</span>
                  <button className="btn btn-danger btn-sm" onClick={() => deleteChallenge(c.id)}>{Icons.trash}</button>
                </div>
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, marginBottom: 20 }}>
                {[
                  { label: 'Current Day', value: currentDay, color: 'var(--gold)' },
                  { label: 'Days Done', value: completions, color: 'var(--green)' },
                  { label: 'Success Rate', value: `${successRate}%`, color: 'var(--blue)' },
                ].map(s => (
                  <div key={s.label} style={{ background: 'var(--surface2)', borderRadius: 10, padding: '14px 16px', textAlign: 'center' }}>
                    <div style={{ fontFamily: 'Playfair Display', fontSize: 24, fontWeight: 900, color: s.color }}>{s.value}</div>
                    <div style={{ fontSize: 11, color: 'var(--text2)', marginTop: 4 }}>{s.label}</div>
                  </div>
                ))}
              </div>

              <div style={{ marginBottom: 12 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8, fontSize: 12, color: 'var(--text2)' }}>
                  <span>Overall Progress</span>
                  <span style={{ fontFamily: 'JetBrains Mono', color: 'var(--gold)' }}>{Math.round(progress)}%</span>
                </div>
                <div className="progress-bar" style={{ height: 10 }}>
                  <div className="progress-fill" style={{ width: `${progress}%` }} />
                </div>
              </div>

              <div>
                <div style={{ fontSize: 12, color: 'var(--text2)', marginBottom: 10 }}>
                  Day-by-day progress
                </div>
                <div className="day-dots">
                  {Array.from({ length: 90 }, (_, i) => {
                    const d = new Date(c.startDate);
                    d.setDate(d.getDate() + i);
                    const key = d.toISOString().split('T')[0];
                    const isToday = key === todayStr();
                    const isPast = new Date(key) < new Date(todayStr());
                    const isDone = state.history[key]?.[c.id];

                    let cls = '';
                    if (isToday) cls = 'today';
                    else if (isDone) cls = 'done';
                    else if (isPast) cls = 'missed';

                    return (
                      <div
                        key={i}
                        className={`day-dot ${cls}`}
                        title={`Day ${i + 1} — ${d.toLocaleDateString()}`}
                        onClick={() => isToday && toggleHabit(c.id)}
                      />
                    );
                  })}
                </div>
              </div>

              {currentDay <= 90 && (
                <div style={{ marginTop: 16, display: 'flex', gap: 10 }}>
                  <button
                    className="btn btn-primary"
                    onClick={() => {
                      // Toggle today for this challenge
                      const histKey = todayStr();
                      const done = state.history[histKey]?.[c.id];
                      toggleHabit(c.id);
                    }}
                    style={{ flex: 1 }}
                  >
                    {state.history[todayStr()]?.[c.id] ? '✅ Completed Today!' : '✓ Mark Day ' + currentDay + ' Complete'}
                  </button>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {showForm && <ChallengeForm onSubmit={addChallenge} onClose={() => setShowForm(false)} />}
    </div>
  );
}

/* ===================== MAIN APP ===================== */
function App() {
  const [page, setPage] = useState('dashboard');
  const [sidebarOpen, setSidebarOpen] = useState(false);

  // Listen for navigation events from child components
  useEffect(() => {
    const handler = e => setPage(e.detail);
    document.addEventListener('navigate', handler);
    return () => document.removeEventListener('navigate', handler);
  }, []);

  const pages = {
    dashboard: <DashboardPage />,
    habits: <HabitsPage />,
    analytics: <AnalyticsPage />,
    challenge: <ChallengePage />,
  };

  return (
    <AppProvider>
      <div className="app-layout">
        <Sidebar
          active={page}
          setActive={setPage}
          open={sidebarOpen}
          setOpen={setSidebarOpen}
        />
        {sidebarOpen && (
          <div
            onClick={() => setSidebarOpen(false)}
            style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 99 }}
          />
        )}
        <div className="main">
          <div style={{ position: 'sticky', top: 0, zIndex: 11, padding: '12px 16px', display: 'none', background: 'var(--surface)', borderBottom: '1px solid var(--border)' }} id="mobile-bar">
          </div>
          {/* Mobile header overlay on top of page-header */}
          <div style={{ position: 'relative' }}>
            <button
              className="mobile-menu-btn"
              onClick={() => setSidebarOpen(true)}
              style={{
                position: 'absolute',
                top: 28,
                left: 20,
                zIndex: 12,
                display: 'none',
              }}
              id="mob-btn"
            >
              {Icons.menu}
            </button>
          </div>
          {pages[page]}
        </div>
      </div>
      <style>{`
        @media (max-width: 700px) {
          #mob-btn { display: flex !important; }
          .page-header { padding-left: 52px !important; }
        }
      `}</style>
    </AppProvider>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
